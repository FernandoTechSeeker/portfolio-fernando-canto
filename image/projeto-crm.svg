<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Capa do projeto CRM com Presença">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="42" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="190" fill="#0f766e" opacity="0.10"/>
  <circle cx="120" cy="640" r="220" fill="#14b8a6" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="500" rx="30" fill="#ffffff" stroke="#d9e7df"/>
    <text x="170" y="185" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">CRM com Presença</text>
    <text x="170" y="225" font-family="Arial, sans-serif" font-size="20" fill="#475569">Cadastro, busca, edição, exclusão e dashboard operacional.</text>
    <g transform="translate(170 285)">
      <rect width="200" height="130" rx="18" fill="#f8fcfa" stroke="#d9e7df"/>
      <text x="28" y="50" font-family="Arial" font-size="28" fill="#0f766e">👥</text>
      <text x="28" y="88" font-family="Arial" font-size="18" font-weight="700" fill="#115e59">Clientes</text>
      <text x="28" y="112" font-family="Arial" font-size="16" fill="#0f172a">CRUD local</text>
    </g>
    <g transform="translate(400 285)">
      <rect width="200" height="130" rx="18" fill="#f8fcfa" stroke="#d9e7df"/>
      <text x="28" y="50" font-family="Arial" font-size="28" fill="#0f766e">🔎</text>
      <text x="28" y="88" font-family="Arial" font-size="18" font-weight="700" fill="#115e59">Busca</text>
      <text x="28" y="112" font-family="Arial" font-size="16" fill="#0f172a">Filtros por status</text>
    </g>
    <g transform="translate(630 285)">
      <rect width="200" height="130" rx="18" fill="#f8fcfa" stroke="#d9e7df"/>
      <text x="28" y="50" font-family="Arial" font-size="28" fill="#0f766e">📊</text>
      <text x="28" y="88" font-family="Arial" font-size="18" font-weight="700" fill="#115e59">Dashboard</text>
      <text x="28" y="112" font-family="Arial" font-size="16" fill="#0f172a">Dados dinâmicos</text>
    </g>
    <g transform="translate(170 465)">
      <rect width="660" height="58" rx="29" fill="#0f766e"/>
      <text x="30" y="37" font-family="Arial" font-size="18" font-weight="800" fill="#ffffff">HTML • CSS • JavaScript • localStorage</text>
    </g>
  </g>
</svg>