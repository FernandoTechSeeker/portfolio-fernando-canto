<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Capa do projeto Food Delivery App">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7c2d12" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="42" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="210" fill="#ea580c" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="115" y="105" width="970" height="510" rx="32" fill="#ffffff" stroke="#fed7aa"/>
    <text x="170" y="178" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#ea580c">FoodFlow</text>
    <text x="170" y="270" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#1f2937">Delivery com produtos</text>
    <text x="170" y="330" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#1f2937">e carrinho funcional</text>
    <text x="170" y="385" font-family="Arial, sans-serif" font-size="21" fill="#6b7280">Front-end funcional • Carrinho • Cálculo de total • Pedido demonstrativo</text>
    <g transform="translate(170 445)">
      <rect width="130" height="90" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="45" y="57" font-size="38">🍔</text>
    </g>
    <g transform="translate(325 445)">
      <rect width="130" height="90" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="45" y="57" font-size="38">🍕</text>
    </g>
    <g transform="translate(480 445)">
      <rect width="130" height="90" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="45" y="57" font-size="38">🥗</text>
    </g>
    <rect x="760" y="205" width="260" height="250" rx="26" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="800" y="265" font-family="Arial" font-size="22" font-weight="900" fill="#1f2937">Resumo rápido</text>
    <line x1="800" y1="310" x2="980" y2="310" stroke="#fed7aa"/>
    <text x="800" y="350" font-family="Arial" font-size="17" fill="#1f2937">Tempo estimado</text>
    <text x="915" y="350" font-family="Arial" font-size="17" font-weight="900" fill="#1f2937">35–45 min</text>
    <line x1="800" y1="380" x2="980" y2="380" stroke="#fed7aa"/>
    <text x="800" y="420" font-family="Arial" font-size="17" fill="#1f2937">Total</text>
    <text x="920" y="420" font-family="Arial" font-size="17" font-weight="900" fill="#ea580c">R$ 80,30</text>
